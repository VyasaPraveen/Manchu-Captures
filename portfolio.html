<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Creative Portfolio | Manchu Captures</title>
  <meta name="description" content="Browse creative pre-wedding, engagement, wedding and portrait galleries by Manchu Captures in Tirupati.">
  <link rel="canonical" href="https://manchucaptures.com/portfolio.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script defer src="assets/js/portfolio.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Manchu Captures</a>
      <nav>
        <ul class="nav">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="services/wedding-photography-tirupati.html">Services</a></li>
          <li><a href="portfolio.html" aria-current="page">Portfolio</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="section container">
    <h1>Portfolio Gallery</h1>
    <p class="section-lead">Click any image for full-screen preview and filter by story type.</p>
    <div class="filters" role="tablist" aria-label="Portfolio categories">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="prewedding">Pre-Wedding</button>
      <button class="filter-btn" data-filter="engagement">Engagement</button>
      <button class="filter-btn" data-filter="wedding">Wedding</button>
      <button class="filter-btn" data-filter="portrait">Portrait</button>
      <button class="filter-btn" data-filter="traditional">Traditional</button>
    </div>

    <section class="gallery-grid">
      <figure class="gallery-item" data-category="prewedding">
        <img loading="lazy" src="assets/images/2024-03-06.webp" alt="Couple dancing under natural sunlight">
      </figure>
      <figure class="gallery-item" data-category="engagement">
        <img loading="lazy" src="assets/images/2024-03-06 (1).webp" alt="Couple in blue attire holding each other indoors">
      </figure>
      <figure class="gallery-item" data-category="prewedding">
        <img loading="lazy" src="assets/images/2024-03-06 (1).jpg" alt="Couple seated with yellow smoke effect during outdoor shoot">
      </figure>
      <figure class="gallery-item" data-category="engagement">
        <img loading="lazy" src="assets/images/2024-03-06 (5).webp" alt="Blue attire engagement portrait with bride looking at camera">
      </figure>
      <figure class="gallery-item" data-category="wedding">
        <img loading="lazy" src="assets/images/2024-03-06 (3).webp" alt="Traditional couple seated on decorative ceremony swing">
      </figure>
      <figure class="gallery-item" data-category="portrait">
        <img loading="lazy" src="assets/images/2024-03-06 (4).webp" alt="Bride closeup portrait in maroon dress with pink backdrop">
      </figure>
      <figure class="gallery-item" data-category="portrait">
        <img loading="lazy" src="assets/images/2024-03-06 (2).webp" alt="Bride portrait lit by ring light against dark curtains">
      </figure>
      <figure class="gallery-item" data-category="portrait">
        <img loading="lazy" src="assets/images/2024-03-06 (6).webp" alt="Closeup bridal portrait with soft focus and pink highlights">
      </figure>
      <figure class="gallery-item" data-category="traditional">
        <img loading="lazy" src="assets/images/2024-03-06.jpg" alt="Couple walking in traditional yellow and white attire">
      </figure>
      <figure class="gallery-item" data-category="wedding">
        <img loading="lazy" src="assets/images/2024-03-06 (7).webp" alt="Wedding color frame with floral swing and festive decor">
      </figure>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog" aria-label="Image preview">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close image preview">&times;</button>
    <img id="lightboxImage" alt="Expanded portfolio preview">
  </div>

  <a class="floating-wa" href="https://wa.me/91XXXXXXXXXX" aria-label="Chat on WhatsApp">Book Your Session</a>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Manchu Captures, Tirupati. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
